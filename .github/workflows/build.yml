name: Build

on:
  push:
    branches:
      - main

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_GENERATE_ASPNET_CERTIFICATE: false
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_SYSTEM_CONSOLE_ALLOW_ANSI_COLOR_REDIRECTION: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Restore · Build · Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'     

      - name: Restore
        run: dotnet restore WithLoveShop.slnx

      - name: Build
        run: dotnet build WithLoveShop.slnx --no-restore --configuration Release

      - name: Test (unit only)
        run: dotnet test WithLoveShop.slnx --no-build --configuration Release --filter "Category=Unit" --logger "trx;LogFileName=test-results.trx"

